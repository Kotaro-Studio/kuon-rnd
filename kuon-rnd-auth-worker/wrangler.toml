name = "kuon-rnd-auth-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "USERS"
id = "ad1d4b42cb5a49d685d60e1ea87f6202"

[[kv_namespaces]]
binding = "SESSIONS"
id = "8dac677d30ff44368936f366c792d4de"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# AUTH_SECRET           — JWT signing key (generate: openssl rand -hex 32)
# RESEND_API_KEY        — for sending magic link emails
# GOOGLE_CLIENT_ID      — Google OAuth credential validation
# STRIPE_SECRET_KEY     — rk_live_... (Restricted Key with subscription scopes) [Phase 7]
# STRIPE_WEBHOOK_SECRET — whsec_... (Webhook endpoint signing secret) [Phase 7]
