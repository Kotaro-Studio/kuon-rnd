name = "kuon-rnd-libretto-worker"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# ───── Workers AI バインディング (Llama 3.3 + BGE-m3) ─────
[ai]
binding = "AI"

# ───── Vectorize: 主要オペラのリブレット埋め込みインデックス ─────
[[vectorize]]
binding = "VECTORS"
index_name = "kuon-rnd-libretto-index"

# ───── KV: 会話履歴・翻訳キャッシュ ─────
[[kv_namespaces]]
binding = "CONVERSATIONS"
id = "e40bd5ee752a4817afe3f234ef9ebc33"

[vars]
ENVIRONMENT = "production"

# ─── Secrets (wrangler secret put で設定) ───
# LIBRETTO_SECRET   - Next.js → Worker 認証
# AUTH_WORKER_URL   - Auth Worker のベース URL
